name: Build Plugin
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x
      - name: Restore & Build
        run: |
          dotnet restore
          dotnet build -c Release
      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: PluginDLL
          path: bin/Release/net6.0/*.dll
